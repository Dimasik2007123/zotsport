version: "3.8"
services:
  backend:
    image: ${DOCKER_USERNAME}/zotsport-backend1:latest
    user: root
    command: >
      sh -c "
      chown -R www-data:www-data /var/www/html/db &&
      chmod -R 777 /var/www/html/db &&
      apache2-foreground
      "
    build:
      context: .
      dockerfile: docker-backend/Dockerfile
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - mynetwork
    volumes:
      - ./public_html/db:/var/www/html/db_copy
      - ./public_html/db:/var/www/html/db
    env_file:
      - .env
    depends_on:
      sqlite:
        condition: service_completed_successfully
  frontend:
    image: ${DOCKER_USERNAME}/zotsport-frontend1:latest
    build:
      context: .
      dockerfile: frontend-react/Dockerfile
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - mynetwork
    env_file:
      - .env
  sqlite:
    image: ${DOCKER_USERNAME}/zotsport-sqlite1:latest
    build:
      context: .
      dockerfile: docker-sqlite/Dockerfile
    restart: "no"
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    networks:
      - mynetwork
    env_file:
      - .env
  proxy:
    image: ${DOCKER_USERNAME}/zotsport-proxy1:latest
    build:
      context: .
      dockerfile: proxy/Dockerfile
    ports:
      - "80:80"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - mynetwork
    depends_on:
      - backend
      - frontend
    env_file:
      - .env
networks:
  mynetwork:
    driver: bridge
